services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: helpTree
      POSTGRES_PASSWORD: helpTree
      POSTGRES_DB: helpTree_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helpTree-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpTree"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - helpTree-network
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # ВАЖНО: Правильная настройка listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Настройки топиков
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # КРИТИЧЕСКИ ВАЖНО: Очищаем meta.properties при запуске
      KAFKA_CLEANUP_POLICY: "delete"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - helpTree-network
    command: >
      bash -c "
        rm -rf /var/lib/kafka/data/*
        /etc/confluent/docker/run
      "
  kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui
      depends_on:
        - kafka
      ports:
        - "8082:8080"
      environment:
        KAFKA_CLUSTERS_0_NAME: local
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
        KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
        KAFKA_CLUSTERS_0_READONLY: "false"
        KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      networks:
        - helpTree-network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus_helpTree
    volumes:
      - ./helpTree-service/src/main/resources/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - '9090:9090'
    restart: unless-stopped
    networks:
      - helpTree-network
    depends_on:
      - postgres
      - kafka

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana_helpTree
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
      GF_UPDATE_CHECKER_ENABLED: false
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - helpTree-network
    volumes:
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    ports:
      - "16686:16686"  # UI
      - "6831:6831/udp"  # Jaeger agent (thrift compact)
      - "14268:14268"  # Jaeger collector (HTTP)
      - "4317:4317"  # OTLP receiver (gRPC)
      - "4318:4318"  # OTLP receiver (HTTP)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
    restart: unless-stopped
    networks:
      - helpTree-network
    volumes:
      - jaeger_data:/var/lib/jaeger
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:16686" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - helpTree-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: helpTree_postgres_data
  zookeeper_data:
    name: helpTree_zookeeper_data
  zookeeper_log:
    name: helpTree_zookeeper_log
  kafka_data:
    name: helpTree_kafka_data
  prometheus_data:
    name: helpTree_prometheus_data
  grafana_data:
    name: helpTree_grafana_data
  jaeger_data:
    name: helpTree_jaeger_data
  minio_data:
    name: helpTree_minio_data

networks:
  helpTree-network:
    name: helpTree-network
    driver: bridge