server:
  port: 8080
  netty:
    max-header-size: 64KB

spring:
  application:
    name: gateway-service
    main:
      web-application-type: reactive

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
      routes:
        - id: helpTree-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/posts/**,/api/helps/**
          filters:
            - StripPrefix=0

        - id: rating-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ratings/**
          filters:
            - StripPrefix=0

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true
  health:
    show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: INFO
    com.example.gatewayservice: DEBUG
    io.micrometer.otel: DEBUG
    io.opentelemetry: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level traceId=%mdc{traceId} spanId=%mdc{spanId} %logger{36} - %msg%n"
