server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cloud:
    gateway:
      enabled: true
      httpclient:
        wiretap: true  # для отладки трассировки

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          protocol: http/protobuf
  metrics:
    export:
      otlp:
        enabled: false

    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
          - info
          - prometheus
          - loggers
          - tracing  # добавляем endpoint для трассировки

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: INFO
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    reactor.netty: DEBUG
    reactor.netty.http.client: DEBUG
    reactor.netty.http.server: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    org.springframework.boot.actuate: INFO
    io.micrometer.tracing: DEBUG
    io.opentelemetry: DEBUG
    io.opentelemetry.exporter.otlp: DEBUG
    org.example.helptreeservice: DEBUG
    org.example.ratingservice: DEBUG


pattern:
  console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - trace.id=%mdc{traceId} span.id=%mdc{spanId} - %msg%n"