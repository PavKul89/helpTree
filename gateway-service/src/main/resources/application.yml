server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  cloud:
    gateway:
      enabled: true


  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.SecurityAutoConfiguration

  security:
    user:
      name: disabled
      password: disabled


management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: w3c
    mdc:
      field-names:
        - traceId
        - spanId
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          protocol: http/protobuf
  metrics:
    export:
      otlp:
        enabled: false

    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
          - info
          - gateway
          - prometheus
      base-path: /actuator
      path-mapping:
        metrics: metrics

  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: INFO
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    reactor.netty: DEBUG
    reactor.netty.http.client: DEBUG
    reactor.netty.http.server: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    org.springframework.boot.actuate: INFO
    io.micrometer.tracing: DEBUG
    io.opentelemetry: DEBUG
    io.opentelemetry.exporter.otlp: DEBUG
    org.example.helptreeservice: DEBUG
    org.example.ratingservice: DEBUG


  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %blue([GATEWAY]) %X{traceId} %X{spanId} %X{requestId} %X{userId} %cyan(%logger{36}) - %msg%n"

app:
  jwtSecret: mySecretKeyForJWTGenerationWithAtLeast64CharactersLong12345678901234567890123456789012
  jwtExpirationMs: 86400000
  rate-limit:
    enabled: true
    default-limit: 60
    auth-limit: 10
    create-limit: 5
    window-seconds: 60

resilience4j:
  ratelimiter:
    configs:
      default:
        limitForPeriod: 60
        limitRefreshPeriod: 60s
        timeoutDuration: 100ms
      auth:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 100ms
      create:
        limitForPeriod: 5
        limitRefreshPeriod: 60s
        timeoutDuration: 100ms