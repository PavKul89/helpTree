server:
  port: 8081

spring:
  application:
    name: helpTree

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/helpTree_db}
    username: ${DB_USER:helpTree}
    password: ${DB_PASS:helpTree}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: helpEvent:org.example.helptreeservice.dto.HelpEvent
    template:
      default-topic: help-events

# ======================================================
# ТРАССИРОВКА (по аналогии с gateway)
# ======================================================
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: w3c
    mdc:
      field-names:
        - traceId
        - spanId
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          protocol: http/protobuf
  metrics:
    export:
      otlp:
        enabled: false
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
          - info
          - prometheus
          - loggers
          - tracing

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
    org.example.helptreeservice: DEBUG
    io.micrometer.tracing: DEBUG
    io.opentelemetry: DEBUG
    io.opentelemetry.exporter.otlp: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %green([HELPTREE]) %X{traceId} %X{spanId} %X{requestId} %X{userId} %cyan(%logger{36}) - %msg%n"



app:
  jwtSecret: mySecretKeyForJWTGenerationWithAtLeast64CharactersLong12345678901234567890123456789012
  jwtExpirationMs: 86400000
  admin:
    email: Admin@test.com
    password: 123456

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:helptree-images}

upload:
  max-size: 10485760  # 10MB в байтах
  allowed-types: image/jpeg,image/png,image/webp,image/gif